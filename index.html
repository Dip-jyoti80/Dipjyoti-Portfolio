<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendSetter | Modern Shopping</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Trend<span>Setter</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count">0</span>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Upgrade Your Style</h1>
            <p>Discover the latest trends in sustainable fashion.</p>
            <a href="#shop" class="btn">Shop Now</a>
        </div>
    </header>

    <section id="shop" class="products">
        <h2>Featured Products</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/250" alt="Product 1">
                <h3>Classic White Tee</h3>
                <p class="price">$25.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/250" alt="Product 2">
                <h3>Denim Jacket</h3>
                <p class="price">$85.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/250" alt="Product 3">
                <h3>Canvas Sneakers</h3>
                <p class="price">$55.00</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 TrendSetter. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
